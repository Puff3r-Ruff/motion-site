<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout</title>
  <script src="https://js.stripe.com/v3/"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .checkout-container {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 26px;
      text-align: center;
    }

    #payment-element {
      margin-top: 20px;
      margin-bottom: 20px;
    }

    #submit {
      width: 100%;
      padding: 14px;
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    #submit:hover {
      background: #219150;
    }

    #submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .loading {
      text-align: center;
      padding: 20px 0;
      color: #777;
      font-size: 14px;
    }

    /* MOBILE FIXED PAY BUTTON */
    @media (max-width: 600px) {
      body {
        padding-bottom: 90px;
      }

      .mobile-paybar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: #fff;
        padding: 15px;
        box-shadow: 0 -2px 6px rgba(0,0,0,0.15);
        z-index: 999;
      }

      .mobile-paybar button {
        width: 100%;
        margin: 0;
      }
    }
  </style>
</head>

<body>

<div class="checkout-container">
  <h1>Checkout</h1>

  <div id="payment-element"></div>
  <div class="loading" id="loading">Loading payment form…</div>

  <button id="submit" disabled>Pay Now</button>
</div>
<script>
const stripe = Stripe("pk_test_51SmbYSRqySo1SbUl9zUatOFdeP2eN1jYSDT4gNWFjzDaPLMF4QaeXONAJ9Ii2QVz7Bugnhp11UFCCFyg625JGGGu00uMAvRXJq");

async function init() {
  const cart = JSON.parse(localStorage.getItem("cart") || "[]");

  const res = await fetch(
    "https://www.ideago.ie/api/stripe/create-payment-intent",
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ cart })
    }
  );

  const { clientSecret } = await res.json();

  const elements = stripe.elements({ clientSecret });
  const paymentElement = elements.create("payment");
  paymentElement.mount("#payment-element");

  document.getElementById("loading").style.display = "none";
  document.getElementById("submit").disabled = false;
  document.getElementById("mobile-paybar").style.display = "block";

  async function pay() {
    document.getElementById("submit").disabled = true;

    await stripe.confirmPayment({
      elements,
      clientSecret,
      confirmParams: {
        return_url: window.location.origin + "/success.html"
      }
    });
  }

  document.getElementById("submit").onclick = pay;
  document.getElementById("submit-mobile").onclick = pay;
}

init();
</script>

</body>
</html>
