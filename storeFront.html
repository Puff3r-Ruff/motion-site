<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Store - E-commerce Template</title>

  <style>
    /* GLOBAL */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #fff;
      color: #111;
      line-height: 1.4;
    }

    /* AMAZON HEADER */
    header {
      background: #131921;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }

    /* SEARCH BAR */
    .search-bar {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .search-bar input {
      width: 60%;
      min-width: 260px;
      padding: 10px;
      border-radius: 4px 0 0 4px;
      border: none;
      font-size: 14px;
    }

    .search-bar button {
      padding: 10px 14px;
      background: #febd69;
      border: 1px solid #a88734;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
    }

    .search-bar button:hover {
      background: #f3a847;
    }

    /* CART */
    .cart {
      background: #232f3e;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    .cart:hover {
      background: #2f3f52;
    }

    /* SUBNAV */
    .subnav {
      background: #232f3e;
      color: #fff;
      padding: 10px 20px;
      font-size: 14px;
    }

    /* MAIN */
    main {
      max-width: 1300px;
      margin: 20px auto;
      padding: 0 20px 40px;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .sort-box select {
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 14px;
    }

    /* PRODUCT GRID — ALWAYS 4 COLUMNS */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 25px;
    }

    @media (max-width: 900px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .products-grid {
        grid-template-columns: 1fr;
      }
    }

    /* PRODUCT CARD */
    .product-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.15s ease;
      cursor: pointer;
    }

    .product-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    /* IMAGE */
    .product-image {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 4px;
      height: 220px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* TEXT */
    .product-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .product-desc {
      font-size: 13px;
      color: #555;
      margin-bottom: 10px;
      min-height: 40px;
    }

    /* META */
    .product-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      gap: 10px;
      flex-wrap: wrap;
    }

    .variant-select {
      flex: 1;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #bbb;
      font-size: 13px;
    }

    /* AMAZON BUTTON */
    .add-btn {
      padding: 9px 14px;
      border-radius: 4px;
      border: 1px solid #a88734;
      background: linear-gradient(#f7dfa5, #f0c14b);
      color: #111;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: linear-gradient(#f5d78e, #eeb933);
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #555;
      border-top: 1px solid #ddd;
      background: #f3f3f3;
    }

    /* MOBILE */
    @media (max-width: 700px) {
      header {
        flex-direction: column;
        align-items: stretch;
      }

      .search-bar {
        order: 3;
        width: 100%;
      }

      .search-bar input {
        width: 100%;
      }

      .cart {
        align-self: flex-end;
      }

      .product-image {
        height: 180px;
      }

      .product-meta {
        flex-direction: column;
        align-items: stretch;
      }

      .add-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1 onclick="window.location.href='index.html'">My Store</h1>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search products..." />
      <button type="button">🔍</button>
    </div>

    <div class="cart" onclick="openCart()">
      🛒 Cart: <span id="cart-count">0</span> items — Total: €<span id="cart-total">0.00</span>
    </div>
  </header>

  <div class="subnav">
    Browse our latest products and deals
  </div>

  <main>
    <div class="top-bar">
      <div class="sort-box">
        <label for="sort-select">Sort by: </label>
        <select id="sort-select">
          <option value="default">Default</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name-asc">Name: A–Z</option>
          <option value="name-desc">Name: Z–A</option>
        </select>
      </div>
    </div>

    <section class="products-grid" id="products-grid">
      <!-- Products load here -->
    </section>
  </main>

  <div class="footer">
    &copy; <span id="year"></span> My Store. All rights reserved.
  </div>

<script>
let products = [];
let cart = [];

const productsGrid = document.getElementById("products-grid");
const cartCountEl = document.getElementById("cart-count");
const cartTotalEl = document.getElementById("cart-total");
const searchInput = document.getElementById("search-input");
const sortSelect = document.getElementById("sort-select");

function loadCart() {
  const saved = localStorage.getItem("cart");
  if (saved) cart = JSON.parse(saved);
  updateCartDisplay();
}
loadCart();

async function loadProducts() {
  try {
    const res = await fetch("Products/products.json");
    const data = await res.json();
    products = data.products;
    renderProducts(products);
  } catch (err) {
    console.error("Error loading products.json:", err);
  }
}

function renderProducts(list) {
  productsGrid.innerHTML = "";

  list.forEach(product => {
    const card = document.createElement("article");
    card.className = "product-card";

    card.innerHTML = `
      <div class="product-image">
        <img src="${product.image}" alt="${product.name}">
      </div>
      <div class="product-title">${product.name}</div>
      <div class="product-desc">${product.description}</div>

      <div class="product-meta">
        <select class="variant-select" data-id="${product.id}">
          ${product.variants.map(v => `
            <option 
              value="${v.id}" 
              data-price="${v.price}" 
              data-stock="${v.stock}"
              data-stripe="${v.stripePriceId}">
              ${v.name} — €${v.price}
            </option>
          `).join("")}
        </select>

        <button class="add-btn" data-id="${product.id}">Add to Cart</button>
      </div>
    `;

    card.onclick = () => window.location.href = `product.html?id=${product.id}`;

    productsGrid.appendChild(card);
  });
  
  // Prevent variant dropdown from triggering card click
  document.querySelectorAll(".variant-select").forEach(select => {
    select.addEventListener("click", e => e.stopPropagation());
    select.addEventListener("change", e => e.stopPropagation());
  });
  
  attachAddToCartHandlers();
}

function attachAddToCartHandlers() {
  document.querySelectorAll(".add-btn").forEach(btn => {
    btn.onclick = function (e) {
      e.stopPropagation();

      const productId = parseInt(this.dataset.id);
      const product = products.find(p => p.id === productId);

      const variantSelect = this.parentElement.querySelector(".variant-select");
      const opt = variantSelect.options[variantSelect.selectedIndex];

      const variantId = opt.value;
      const price = parseFloat(opt.dataset.price);
      const stock = parseInt(opt.dataset.stock);
      const stripePriceId = opt.dataset.stripe;

      const existing = cart.find(i => i.variantId === variantId);

      if (existing) {
        if (existing.quantity >= stock) {
          alert("No more stock available for this variant.");
          return;
        }
        existing.quantity += 1;
      } else {
        cart.push({
          productId,
          variantId,
          name: product.name,
          variantName: opt.textContent,
          price,
          stripePriceId,
          quantity: 1,
          stock
        });
      }

      saveCart();
      updateCartDisplay();
    };
  });
}

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function updateCartDisplay() {
  const count = cart.reduce((sum, i) => sum + i.quantity, 0);
  const total = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);

  cartCountEl.textContent = count;
  cartTotalEl.textContent = total.toFixed(2);
}

searchInput.addEventListener("input", filterProducts);
sortSelect.addEventListener("change", applySort);

document.getElementById("year").textContent = new Date().getFullYear();
loadProducts();

function openCart() {
  window.location.href = "cart.html";
}

function filterProducts() {
  const term = searchInput.value.toLowerCase();

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(term) ||
    p.description.toLowerCase().includes(term)
  );

  renderProducts(filtered);
}

function applySort() {
  const value = sortSelect.value;

  let sorted = [...products];

  if (value === "price-asc") {
    sorted.sort((a, b) => {
      const pa = a.variants?.[0]?.price || 0;
      const pb = b.variants?.[0]?.price || 0;
      return pa - pb;
    });
  } 
  else if (value === "price-desc") {
    sorted.sort((a, b) => {
      const pa = a.variants?.[0]?.price || 0;
      const pb = b.variants?.[0]?.price || 0;
      return pb - pa;
    });
  } 
  else if (value === "name-asc") {
    sorted.sort((a, b) => a.name.localeCompare(b.name));
  } 
  else if (value === "name-desc") {
    sorted.sort((a, b) => b.name.localeCompare(a.name));
  }

  renderProducts(sorted);
}
</script>

</body>
</html>
