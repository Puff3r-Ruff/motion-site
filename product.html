<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product Page</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
  }

  .page {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .gallery, .info, .buy-box {
    background: white;
    padding: 20px;
    border-radius: 8px;
  }

  .gallery {
    flex: 1;
    min-width: 300px;
  }

  .main-img {
    width: 100%;
    height: 450px;
    object-fit: cover;
    border: 1px solid #ddd;
    border-radius: 8px;
  }

  .thumbs {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  .thumbs img {
    width: 70px;
    height: 70px;
    object-fit: cover;
    border: 1px solid #ccc;
    border-radius: 6px;
    cursor: pointer;
  }

  .info {
    flex: 1.2;
    min-width: 300px;
  }

  .info h1 {
    margin: 0;
    font-size: 26px;
  }

  .price {
    font-size: 28px;
    color: #b12704;
    margin: 10px 0;
  }

  .buy-box {
    width: 280px;
    min-width: 260px;
    height: fit-content;
    border: 1px solid #ddd;
  }

  .buy-box button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 20px;
    font-size: 16px;
    cursor: pointer;
  }

  .add-cart {
    background: #ffd814;
  }

  .buy-now {
    background: #ffa41c;
  }

  .details {
    max-width: 1200px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
  }

  @media (max-width: 768px) {
    .main-img {
      height: 300px;
    }
    .buy-box {
      width: 100%;
    }
  }
</style>
</head>
<body>

<div class="page">

  <!-- LEFT: IMAGE GALLERY -->
  <div class="gallery">
    <img id="mainImg" class="main-img">
    <div id="thumbContainer" class="thumbs"></div>
  </div>

  <!-- CENTER: PRODUCT INFO -->
  <div class="info">
    <h1 id="productName"></h1>
    <div class="price" id="productPrice"></div>
    <p id="productDesc"></p>

    <label><strong>Variant:</strong></label><br>
    <select id="variantSelect" style="padding:8px; margin:10px 0; width:200px;"></select>
  </div>

  <!-- RIGHT: BUY BOX -->
  <div class="buy-box">
    <div class="price" id="buyPrice"></div>
    <button class="add-cart" id="addCartBtn">Add to Cart</button>
    <button class="buy-now" id="buyNowBtn">Buy Now</button>
  </div>

</div>

<div class="details">
  <h2>Description</h2>
  <p id="longDesc"></p>
</div>

<script>
let product = null;
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

async function loadProduct() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get("id"));

  const res = await fetch("/motion-site/Products/products.json");
  const data = await res.json();

  product = data.products.find(p => p.id === id);
  if (!product) return;

  // Fill info
  document.getElementById("productName").textContent = product.name;
  document.getElementById("productDesc").textContent = product.description;
  document.getElementById("longDesc").textContent = product.description;

  // Variants
  const variantSelect = document.getElementById("variantSelect");
  product.variants.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v.id;
    opt.textContent = `${v.name} — €${v.price}`;
    opt.dataset.price = v.price;
    opt.dataset.stock = v.stock;
    opt.dataset.stripe = v.stripePriceId;
    variantSelect.appendChild(opt);
  });

  variantSelect.addEventListener("change", updateVariantDisplay);
  updateVariantDisplay();

  // Images
  document.getElementById("mainImg").src = product.image;
  const thumbContainer = document.getElementById("thumbContainer");
  thumbContainer.innerHTML = "";

  const images = [product.image]; // Expand later if needed

  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.onclick = () => {
      document.getElementById("mainImg").src = src;
    };
    thumbContainer.appendChild(img);
  });

  // Buttons
  document.getElementById("addCartBtn").onclick = addToCart;
  document.getElementById("buyNowBtn").onclick = buyNow;
}

function updateVariantDisplay() {
  const select = document.getElementById("variantSelect");
  const opt = select.options[select.selectedIndex];

  const price = parseFloat(opt.dataset.price);
  const stock = parseInt(opt.dataset.stock);

  document.getElementById("productPrice").textContent = "€" + price.toFixed(2);
  document.getElementById("buyPrice").textContent = "€" + price.toFixed(2);

  document.getElementById("addCartBtn").disabled = stock <= 0;
  document.getElementById("buyNowBtn").disabled = stock <= 0;
}

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart() {
  const select = document.getElementById("variantSelect");
  const opt = select.options[select.selectedIndex];

  const variantId = opt.value;
  const price = parseFloat(opt.dataset.price);
  const stock = parseInt(opt.dataset.stock);
  const stripePriceId = opt.dataset.stripe;

  const existing = cart.find(i => i.variantId === variantId);

  if (existing) {
    if (existing.quantity >= stock) {
      alert("No more stock available.");
      return;
    }
    existing.quantity += 1;
  } else {
    cart.push({
      productId: product.id,
      variantId,
      name: product.name,
      variantName: opt.textContent,
      price,
      stripePriceId,
      quantity: 1,
      stock
    });
  }

  saveCart();
  alert("Added to cart!");
}

function buyNow() {
  const select = document.getElementById("variantSelect");
  const opt = select.options[select.selectedIndex];

  const price = parseFloat(opt.dataset.price);
  const stock = parseInt(opt.dataset.stock);
  const stripePriceId = opt.dataset.stripe;

  if (stock <= 0) {
    alert("Out of stock.");
    return;
  }

  // Create a temporary cart with only this item
  const tempCart = [{
    productId: product.id,
    variantId: opt.value,
    name: product.name,
    variantName: opt.textContent,
    price,
    stripePriceId,
    quantity: 1,
    stock
  }];

  localStorage.setItem("checkout_single", JSON.stringify(tempCart));

  // Redirect to checkout with single item mode
  window.location.href = "checkout.html?single=true";
}

loadProduct();
</script>

</body>
</html>
