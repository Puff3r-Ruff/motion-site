<!DOCTYPE html>
<html>
<head>
  <title>Your Cart</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #ddd; }
    .qty-controls button { padding: 4px 8px; }
    .checkout-btn { margin-top: 20px; padding: 12px 20px; background: #27ae60; color: #fff; border: none; cursor: pointer; }
  </style>
</head>
<body>

<h1>Your Cart</h1>
<div id="cart-items"></div>

<h2>Total: €<span id="total"></span></h2>

<button class="checkout-btn" onclick="goCheckout()">Proceed to Checkout</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function renderCart() {
  const container = document.getElementById("cart-items");
  container.innerHTML = "";

  cart.forEach((item, index) => {
    container.innerHTML += `
      <div class="item">
        <div>
          <strong>${item.name}</strong><br>
          ${item.variantName}<br>
          €${item.price}
        </div>

        <div class="qty-controls">
          <button onclick="changeQty(${index}, -1)">-</button>
          ${item.quantity}
          <button onclick="changeQty(${index}, 1)">+</button>
        </div>

        <button onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });

  updateTotal();
}

function changeQty(i, delta) {
  const item = cart[i];

  if (delta === 1 && item.quantity >= item.stock) {
    alert("No more stock available.");
    return;
  }

  item.quantity += delta;

  if (item.quantity <= 0) cart.splice(i, 1);

  save();
}

function removeItem(i) {
  cart.splice(i, 1);
  save();
}

function save() {
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function updateTotal() {
  const total = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);
  document.getElementById("total").textContent = total.toFixed(2);
}

function goCheckout() {
  window.location.href = "checkout.html";
}

renderCart();
</script>

</body>
</html>
